services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mealplanner
      POSTGRES_USER: mealplanner
      POSTGRES_PASSWORD: mealplanner_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplanner -d mealplanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/MealPlanner.Api/Dockerfile
    ports:
      - "5100:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=mealplanner;Username=mealplanner;Password=mealplanner_dev"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: src/MealPlanner.Web/Dockerfile
    ports:
      - "5200:8080"
    environment:
      ApiBaseUrl: "http://api:8080"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
